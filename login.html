<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lavínia Souto</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="page-login">
    <div class="container">
        <form class="form" id="loginForm" novalidate>
            <div class="h2">
                <h2>Login</h2>
            </div>
            <div class="input-cpf" id="inputcpf">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" autocomplete="username" maxlength="14" required>
            </div>
            <div class="input-senha">
                <label for="password">SENHA:</label>
                <input type="password" name="password" id="password" placeholder="Digite sua senha" autocomplete="current-password" required>
            </div>
            <div class="btn">
                <button type="submit" id="btnEnter">Entrar</button>
            </div>
        </form>
    </div>
    <div class="alerts">
        <div class="alert-erro" id="errologin">
            <h3>CPF ou senha incorretos!</h3>
        </div>
        <div class="alert-true" id="corretologin">
            <h3>Sucesso!</h3>
        </div>
        <div class="alert-servidor" id="erroservidor">
            <h3>Erro no servidor!</h3>
        </div>
    </div>
    <script type="module" src="./js/login.js"></script>
</body>
</html>
